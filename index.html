<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTJ Welding & Fabrication — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1011;
    --bg2:      #181a1b;
    --bg3:      #212426;
    --border:   #2e3134;
    --border2:  #3d4146;
    --text:     #e8e4dc;
    --muted:    #8a8680;
    --hint:     #555250;
    --accent:   #e07b2a;
    --accent2:  #c06018;
    --green:    #4caf7d;
    --red:      #d95f5f;
    --blue:     #5b9bd5;
    --purple:   #9b8ed4;
    --yellow:   #d4a827;
    --radius:   6px;
    --font:     'Barlow', sans-serif;
    --font-condensed: 'Barlow Condensed', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-condensed);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }
  .header-meta {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Layout ── */
  .layout { display: flex; height: calc(100vh - 56px); }

  /* ── Sidebar ── */
  nav {
    width: 200px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-section {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--hint);
    padding: 12px 16px 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    border-left: 2px solid transparent;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
  }
  .nav-item:hover { color: var(--text); background: var(--bg3); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg3); }
  .nav-icon { font-size: 16px; }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    background: var(--bg);
  }

  /* ── Page header ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-title {
    font-family: var(--font-condensed);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-val {
    font-family: var(--font-condensed);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-val.accent { color: var(--accent); }
  .stat-val.green  { color: var(--green); }
  .stat-val.red    { color: var(--red); }
  .stat-val.yellow { color: var(--yellow); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  input[type=text], select {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 6px 10px;
    height: 34px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--hint); }
  input[type=text] { width: 220px; }
  select { min-width: 130px; cursor: pointer; }
  select option { background: var(--bg3); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    height: 34px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    letter-spacing: 0.02em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); border-color: var(--border2); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-sm { height: 28px; padding: 4px 10px; font-size: 12px; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); background: var(--bg3); border-color: var(--border); }

  /* ── Table ── */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.025); }
  .lead-name { font-weight: 600; font-size: 14px; }
  .lead-notes { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block; }
  .td-phone { color: var(--muted); font-size: 13px; }
  .td-source { color: var(--muted); font-size: 12px; }
  .due-date { font-size: 12px; }
  .due-soon { color: var(--red); font-weight: 600; }
  .due-ok { color: var(--muted); }
  .no-date { color: var(--hint); }

  /* ── Status badges ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .b-New      { background: rgba(91,155,213,0.15); color: var(--blue); border: 1px solid rgba(91,155,213,0.3); }
  .b-Quoted   { background: rgba(155,142,212,0.15); color: var(--purple); border: 1px solid rgba(155,142,212,0.3); }
  .b-Followup { background: rgba(212,168,39,0.15); color: var(--yellow); border: 1px solid rgba(212,168,39,0.3); }
  .b-Scheduled{ background: rgba(224,123,42,0.15); color: var(--accent); border: 1px solid rgba(224,123,42,0.3); }
  .b-Won      { background: rgba(76,175,125,0.15); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
  .b-Lost     { background: rgba(217,95,95,0.15); color: var(--red); border: 1px solid rgba(217,95,95,0.3); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--hint);
    font-size: 13px;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    width: 480px;
    max-width: 96vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title {
    font-family: var(--font-condensed);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .field input, .field select, .field textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field input::placeholder, .field textarea::placeholder { color: var(--hint); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── Action bar (bulk) ── */
  .action-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .action-bar.visible { display: flex; }

  /* ── Pipeline view ── */
  #view-pipeline { display: none; }
  .pipeline-board {
    display: grid;
    grid-template-columns: repeat(6, minmax(140px, 1fr));
    gap: 12px;
    align-items: start;
  }
  .pipeline-col {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .pipeline-col-header {
    padding: 10px 12px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pipeline-count {
    background: var(--border);
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
  }
  .pipeline-cards { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
  .pipeline-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 10px 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .pipeline-card:hover { border-color: var(--border2); }
  .pc-name { font-weight: 600; font-size: 13px; line-height: 1.3; }
  .pc-type { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .pc-date { font-size: 11px; color: var(--hint); margin-top: 6px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">MTJ <span>Welding</span> & Fabrication</div>
  <div class="header-meta">Customer Relationship Manager</div>
</header>

<div class="layout">
  <nav>
    <div class="nav-section">Views</div>
    <div class="nav-item active" onclick="switchView('leads',this)" data-view="leads">
      <span class="nav-icon">&#9776;</span> All leads
    </div>
    <div class="nav-item" onclick="switchView('pipeline',this)" data-view="pipeline">
      <span class="nav-icon">&#9636;</span> Pipeline
    </div>
    <div class="nav-section">Filter</div>
    <div class="nav-item" onclick="quickFilter('New',this)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block"></span> New
    </div>
    <div class="nav-item" onclick="quickFilter('Quoted',this)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--purple);display:inline-block"></span> Quoted
    </div>
    <div class="nav-item" onclick="quickFilter('Follow-up',this)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block"></span> Follow-up
    </div>
    <div class="nav-item" onclick="quickFilter('Scheduled',this)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block"></span> Scheduled
    </div>
    <div class="nav-item" onclick="quickFilter('Won',this)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span> Won
    </div>
    <div class="nav-item" onclick="quickFilter('Lost',this)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span> Lost
    </div>
    <div class="nav-section" style="margin-top:auto"></div>
    <div class="nav-item" onclick="exportCSV()">
      <span class="nav-icon">&#8659;</span> Export CSV
    </div>
  </nav>

  <main>

    <!-- LEADS VIEW -->
    <div id="view-leads">
      <div class="page-header">
        <div class="page-title">Lead Tracker</div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Lead</button>
      </div>

      <div class="stats-bar" id="stats-bar"></div>

      <div class="toolbar">
        <input type="text" id="search" placeholder="Search name, phone, notes..." oninput="renderLeads()">
        <select id="filter-status" onchange="renderLeads()">
          <option value="">All statuses</option>
          <option>New</option><option>Quoted</option><option>Follow-up</option>
          <option>Scheduled</option><option>Won</option><option>Lost</option>
        </select>
        <select id="filter-type" onchange="renderLeads()">
          <option value="">All job types</option>
          <option>Gate operator</option><option>Gate fabrication</option>
          <option>Handrail</option><option>Fence</option><option>Other</option>
        </select>
        <select id="filter-source" onchange="renderLeads()">
          <option value="">All sources</option>
          <option>Referral</option><option>Lawn sign</option><option>Social media</option>
          <option>Google</option><option>Repeat customer</option><option>Other</option>
        </select>
        <button class="btn" onclick="clearFilters()">Clear</button>
      </div>

      <div class="table-wrap">
        <table>
          <colgroup>
            <col style="width:200px"><col style="width:130px"><col style="width:140px">
            <col style="width:100px"><col style="width:110px"><col style="width:100px">
            <col style="width:110px"><col style="width:80px">
          </colgroup>
          <thead>
            <tr>
              <th>Customer</th><th>Phone</th><th>Job type</th>
              <th>Status</th><th>Est. value</th><th>Source</th>
              <th>Follow-up</th><th></th>
            </tr>
          </thead>
          <tbody id="leads-tbody"></tbody>
        </table>
        <div id="empty-state" class="empty" style="display:none">No leads match your filters.</div>
      </div>
    </div>

    <!-- PIPELINE VIEW -->
    <div id="view-pipeline">
      <div class="page-header">
        <div class="page-title">Pipeline</div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Lead</button>
      </div>
      <div class="pipeline-board" id="pipeline-board"></div>
    </div>

  </main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Lead</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Customer name *</label><input type="text" id="f-name" placeholder="Full name"></div>
        <div class="field"><label>Phone *</label><input type="text" id="f-phone" placeholder="801-555-0000"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Email</label><input type="text" id="f-email" placeholder="email@example.com"></div>
        <div class="field"><label>Est. value ($)</label><input type="text" id="f-value" placeholder="0"></div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Job type</label>
          <select id="f-type">
            <option>Gate operator</option><option>Gate fabrication</option>
            <option>Handrail</option><option>Fence</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option>New</option><option>Quoted</option><option>Follow-up</option>
            <option>Scheduled</option><option>Won</option><option>Lost</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Lead source</label>
          <select id="f-source">
            <option>Referral</option><option>Lawn sign</option><option>Social media</option>
            <option>Google</option><option>Repeat customer</option><option>Other</option>
          </select>
        </div>
        <div class="field"><label>Follow-up date</label><input type="date" id="f-followup"></div>
      </div>
      <div class="field"><label>Address / location</label><input type="text" id="f-address" placeholder="Job site address"></div>
      <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Scope, specs, access notes, customer requests..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<script>
const STATUSES = ['New','Quoted','Follow-up','Scheduled','Won','Lost'];
const today = new Date().toISOString().slice(0,10);
let editingId = null;

// ── Default data ──────────────────────────────────────────────
const DEFAULT_LEADS = [
  {id:1,name:'Dave Henriksen',phone:'801-555-0142',email:'',value:1850,type:'Gate operator',status:'Quoted',source:'Referral',followup:'2026-05-29',address:'4421 S Redwood Rd, SLC',notes:'LiftMaster LA500, double driveway, existing posts'},
  {id:2,name:'Sarah Talmage',phone:'801-555-0387',email:'stalmage@email.com',value:620,type:'Handrail',status:'Scheduled',source:'Lawn sign',followup:'2026-06-02',address:'882 E 400 N, Bountiful',notes:'3 steps, front porch, black powder coat, 1.5" square tube'},
  {id:3,name:'Rio Verde HOA',phone:'801-555-0219',email:'manager@rioverde.org',value:4200,type:'Gate fabrication',status:'New',source:'Google',followup:'2026-05-27',address:'Rio Verde Dr, Draper',notes:'Slide gate 16 ft, community entrance, needs keypad'},
  {id:4,name:'Mike Parson',phone:'801-555-0091',email:'',value:3100,type:'Fence',status:'Won',source:'Repeat customer',followup:'',address:'1204 N Main St, Brigham City',notes:'120 ft cedar privacy fence, 6 ft height'},
  {id:5,name:'Lori Ashby',phone:'801-555-0654',email:'loriashby@email.com',value:480,type:'Handrail',status:'Lost',source:'Social media',followup:'',address:'',notes:'Went with another contractor on price'},
  {id:6,name:'Canyon View Apts',phone:'801-555-0773',email:'',value:2800,type:'Gate operator',status:'Follow-up',source:'Referral',followup:'2026-05-28',address:'900 Canyon View Dr, Ogden',notes:'Two swing gates, LiftMaster CSW200, needs intercom'},
];

// ── Persistence ───────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem('mtj-leads')) || DEFAULT_LEADS; }
  catch(e) { return DEFAULT_LEADS; }
}
function save(leads) {
  try { localStorage.setItem('mtj-leads', JSON.stringify(leads)); } catch(e) {}
}
let leads = load();
let nextId = leads.reduce((m,l)=>Math.max(m,l.id),0)+1;

// ── Helpers ───────────────────────────────────────────────────
function daysUntil(d) {
  if(!d) return null;
  return Math.ceil((new Date(d+' 00:00') - new Date())/(86400000));
}
function fmt$(n) {
  if(!n) return '—';
  return '$'+Number(n).toLocaleString();
}
function fmtDate(d) {
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return m+'/'+day+'/'+y.slice(2);
}
function badgeClass(s) {
  return 'b-'+s.replace(/[^a-z]/gi,'');
}

// ── Stats bar ─────────────────────────────────────────────────
function renderStats() {
  const active = leads.filter(l=>!['Won','Lost'].includes(l.status));
  const won    = leads.filter(l=>l.status==='Won');
  const dueNow = leads.filter(l=>{ const d=daysUntil(l.followup); return d!==null&&d<=1&&!['Won','Lost'].includes(l.status); });
  const pipeline= active.reduce((s,l)=>s+(Number(l.value)||0),0);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total leads</div><div class="stat-val">${leads.length}</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-val accent">${active.length}</div></div>
    <div class="stat-card"><div class="stat-label">Won</div><div class="stat-val green">${won.length}</div></div>
    <div class="stat-card"><div class="stat-label">Follow-up due</div><div class="stat-val ${dueNow.length?'red':''}">${dueNow.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pipeline value</div><div class="stat-val" style="font-size:20px">$${pipeline.toLocaleString()}</div></div>
  `;
}

// ── Leads table ───────────────────────────────────────────────
function renderLeads() {
  const search  = document.getElementById('search').value.toLowerCase();
  const fStatus = document.getElementById('filter-status').value;
  const fType   = document.getElementById('filter-type').value;
  const fSource = document.getElementById('filter-source').value;

  const filtered = leads.filter(l=>{
    if(fStatus && l.status !== fStatus) return false;
    if(fType   && l.type   !== fType)   return false;
    if(fSource && l.source !== fSource) return false;
    if(search  && !(
      l.name.toLowerCase().includes(search)  ||
      l.phone.includes(search)               ||
      (l.notes||'').toLowerCase().includes(search) ||
      (l.address||'').toLowerCase().includes(search)
    )) return false;
    return true;
  });

  const tbody = document.getElementById('leads-tbody');
  document.getElementById('empty-state').style.display = filtered.length ? 'none' : 'block';

  tbody.innerHTML = filtered.map(l=>{
    const days = daysUntil(l.followup);
    const dueCls = days!==null && days<=1 && !['Won','Lost'].includes(l.status) ? 'due-soon' : 'due-ok';
    const dueText = l.followup ? `<span class="due-date ${dueCls}">${fmtDate(l.followup)}${days!==null&&days<=0?' &#9679;':''}</span>` : '<span class="no-date">—</span>';
    return `<tr>
      <td>
        <div class="lead-name">${esc(l.name)}</div>
        <span class="lead-notes">${esc(l.notes||'')}</span>
      </td>
      <td class="td-phone">${esc(l.phone)}</td>
      <td>${esc(l.type)}</td>
      <td><span class="badge ${badgeClass(l.status)}">${l.status}</span></td>
      <td style="color:var(--muted);font-size:13px">${fmt$(l.value)}</td>
      <td class="td-source">${esc(l.source)}</td>
      <td>${dueText}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openModal(${l.id})" title="Edit">&#9998;</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteLead(${l.id})" title="Delete" style="color:var(--red)">&#10007;</button>
      </td>
    </tr>`;
  }).join('');

  renderStats();
  renderPipeline();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Pipeline ──────────────────────────────────────────────────
function renderPipeline() {
  const board = document.getElementById('pipeline-board');
  board.innerHTML = STATUSES.map(status=>{
    const col = leads.filter(l=>l.status===status);
    const cards = col.map(l=>{
      const days = daysUntil(l.followup);
      const dateHtml = l.followup ? `<div class="pc-date ${days!==null&&days<=1?'due-soon':''}">${fmtDate(l.followup)}</div>` : '';
      return `<div class="pipeline-card" onclick="openModal(${l.id})">
        <div class="pc-name">${esc(l.name)}</div>
        <div class="pc-type">${esc(l.type)}${l.value?' · $'+Number(l.value).toLocaleString():''}</div>
        ${dateHtml}
      </div>`;
    }).join('');
    return `<div class="pipeline-col">
      <div class="pipeline-col-header">
        <span class="badge ${badgeClass(status)}">${status}</span>
        <span class="pipeline-count">${col.length}</span>
      </div>
      <div class="pipeline-cards">${cards||'<div style="color:var(--hint);font-size:12px;padding:4px 2px">Empty</div>'}</div>
    </div>`;
  }).join('');
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Edit Lead' : 'New Lead';
  const l = id ? leads.find(x=>x.id===id) : null;
  document.getElementById('f-name').value     = l?.name     || '';
  document.getElementById('f-phone').value    = l?.phone    || '';
  document.getElementById('f-email').value    = l?.email    || '';
  document.getElementById('f-value').value    = l?.value    || '';
  document.getElementById('f-type').value     = l?.type     || 'Gate operator';
  document.getElementById('f-status').value   = l?.status   || 'New';
  document.getElementById('f-source').value   = l?.source   || 'Referral';
  document.getElementById('f-followup').value = l?.followup || '';
  document.getElementById('f-address').value  = l?.address  || '';
  document.getElementById('f-notes').value    = l?.notes    || '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(), 50);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalOutside(e) {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
}
function saveLead() {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    name,
    phone:    document.getElementById('f-phone').value.trim(),
    email:    document.getElementById('f-email').value.trim(),
    value:    parseFloat(document.getElementById('f-value').value)||0,
    type:     document.getElementById('f-type').value,
    status:   document.getElementById('f-status').value,
    source:   document.getElementById('f-source').value,
    followup: document.getElementById('f-followup').value,
    address:  document.getElementById('f-address').value.trim(),
    notes:    document.getElementById('f-notes').value.trim(),
  };
  if(editingId) {
    const idx = leads.findIndex(l=>l.id===editingId);
    if(idx > -1) leads[idx] = {...leads[idx], ...data};
  } else {
    leads.unshift({id: nextId++, ...data});
  }
  save(leads);
  closeModal();
  renderLeads();
}
function deleteLead(id) {
  if(!confirm('Remove this lead? This cannot be undone.')) return;
  leads = leads.filter(l=>l.id!==id);
  save(leads);
  renderLeads();
}

// ── Quick filter (sidebar) ────────────────────────────────────
function quickFilter(status, el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filter-status').value = status;
  switchView('leads', null);
  renderLeads();
}

// ── View switching ────────────────────────────────────────────
function switchView(view, el) {
  document.getElementById('view-leads').style.display    = view==='leads'    ? 'block' : 'none';
  document.getElementById('view-pipeline').style.display = view==='pipeline' ? 'block' : 'none';
  if(el) {
    document.querySelectorAll('[data-view]').forEach(n=>n.classList.remove('active'));
    el.classList.add('active');
  }
}

// ── Export CSV ────────────────────────────────────────────────
function exportCSV() {
  const cols = ['id','name','phone','email','value','type','status','source','followup','address','notes'];
  const rows = [cols.join(','), ...leads.map(l=>cols.map(c=>`"${String(l[c]||'').replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mtj-leads-'+today+'.csv';
  a.click();
}

// ── Clear filters ─────────────────────────────────────────────
function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-type').value = '';
  document.getElementById('filter-source').value = '';
  renderLeads();
}

// ── Keyboard shortcut ─────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='n'&&!e.target.matches('input,select,textarea')) openModal();
});

// ── Init ──────────────────────────────────────────────────────
renderLeads();
</script>
</body>
</html>
